name: small_admet_mutagenicity_all_algorithms
description: Low-budget mutagenicity scout over all available/default algorithms.
tier: small
oracle_set: explicit
oracles:
  - mutagenicity
algorithm_set: default
algorithms:
  - available
smi_file: benchmark_inputs/zinc_sanity_1k.smi
output_root: oracle_benchmark_results
n_jobs: 1
skip_existing: true
continue_on_error: true
env:
  PYTHONPATH: /users/PCON0041/mey200/testing
notes:
  objective_direction: maximize
  oracle_transform: mutagenicity probability is converted to 1 - toxicity
  interpretation: higher scores mean lower predicted mutagenicity liability
  seeds: small tier uses seed 0
  budget: small tier uses 100 oracle calls
  reason: split endpoint into its own overnight job to avoid monolithic timeout
